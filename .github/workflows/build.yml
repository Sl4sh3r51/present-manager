name: Build and Analysis
on:
  push:
    branches:
      - main
      - develop
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build-develop:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: develop
    permissions:
      contents: read
      actions: read
      security-events: write

    name: Build and Analysis (develop)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu' # Alternative distribution options are available.

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and analyze
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.DB_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: mvn -B clean verify spotbugs:spotbugs pmd:pmd checkstyle:checkstyle site

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      - name: Upload HTML Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-analysis-reports-develop
          path: |
            target/site/spotbugs.html
            target/site/pmd.html
            target/site/checkstyle.html
            target/site/css/
            target/site/images/

  build-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: main
    permissions:
      contents: read
      actions: read
      security-events: write

    name: Build and Analysis (main)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu' # Alternative distribution options are available.

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build and analyze
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.DB_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: mvn -B clean verify spotbugs:spotbugs pmd:pmd checkstyle:checkstyle site

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      - name: Upload HTML Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: code-analysis-reports-develop
          path: |
            target/site/spotbugs.html
            target/site/pmd.html
            target/site/checkstyle.html
            target/site/css/
            target/site/images/