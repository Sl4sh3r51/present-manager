name: Build and Analysis
on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    types: [ opened, synchronize, reopened ]
permissions:
  contents: write
  actions: read
  security-events: write
  pages: write
jobs:
  build-develop:
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feature/')
    runs-on: ubuntu-latest
    environment: develop
    name: Build and Analysis (develop)

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: presentmanager_test
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and analyze
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/presentmanager_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
          SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: https://localhost/dummy
        run: mvn -B clean verify spotbugs:spotbugs pmd:pmd checkstyle:checkstyle site

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      - name: Create index Page for reports
        if: always()
        run: |
          mkdir -p target/site/reports
          cat > target/site/reports/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Code Analysis Reports - develop</title>
              <style>
                  body { font-family: Arial, sans-serif; margin: 40px; }
                  h1 { color: #333; }
                  .report-link {
                      display: block;
                      padding: 15px;
                      margin: 10px 0;
                      background: #f5f5f5;
                      border-radius: 5px;
                      text-decoration: none;
                      color: #0366d6;
                  }
                  .report-link:hover { background: #e5e5e5; }
              </style>
          </head>
          <body>
              <h1>Code Analysis Reports - develop Branch</h1>
              <a class="report-link" href="../spotbugs.html">SpotBugs Report</a>
              <a class="report-link" href="../pmd.html">PMD Report</a>
              <a class="report-link" href="../checkstyle.html">Checkstyle Report</a>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages (Develop)
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site
          destination_dir: develop
          keep_files: false
          commit_message: "Deploy reports for develop - Run #${{ github.run_number }}"

      - name: Display Report URLs
        if: always()
        env:
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/develop
        run: |
          echo "::notice title=Reports Deployed (develop)::Dashboard -> $PAGES_URL/index.html"
          echo ""
          echo "Code Analysis Dashboard:"
          echo "   -> $PAGES_URL/index.html"
          echo ""
          echo "Individual Reports:"
          echo "   SpotBugs    -> $PAGES_URL/spotbugs.html"
          echo "   PMD         -> $PAGES_URL/pmd.html"
          echo "   Checkstyle  -> $PAGES_URL/checkstyle.html"
          echo ""
          echo "Security Analysis:"
          echo "   CodeQL      -> https://github.com/${{ github.repository }}/security/code-scanning"

  build-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: main
    name: Build and Analysis (main)

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: presentmanager_test
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and analyze
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/presentmanager_test
          SPRING_DATASOURCE_USERNAME: postgres
          SPRING_DATASOURCE_PASSWORD: postgres
          SPRING_JPA_HIBERNATE_DDL_AUTO: create-drop
          SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: https://localhost/dummy
        run: mvn -B clean verify spotbugs:spotbugs pmd:pmd checkstyle:checkstyle site

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      - name: Create index Page for reports
        if: always()
        run: |
          mkdir -p target/site/reports
          cat > target/site/reports/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Code Analysis Reports - main</title>
              <style>
                  body { font-family: Arial, sans-serif; margin: 40px; }
                  h1 { color: #333; }
                  .report-link {
                      display: block;
                      padding: 15px;
                      margin: 10px 0;
                      background: #f5f5f5;
                      border-radius: 5px;
                      text-decoration: none;
                      color: #0366d6;
                  }
                  .report-link:hover { background: #e5e5e5; }
              </style>
          </head>
          <body>
              <h1>Code Analysis Reports - main Branch</h1>
              <a class="report-link" href="../spotbugs.html">SpotBugs Report</a>
              <a class="report-link" href="../pmd.html">PMD Report</a>
              <a class="report-link" href="../checkstyle.html">Checkstyle Report</a>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages (Main)
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site
          destination_dir: main
          keep_files: false
          commit_message: "Deploy reports for main - Run #${{ github.run_number }}"

      - name: Display Report URLs
        if: always()
        env:
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/main
        run: |
          echo "::notice title=Reports Deployed (main)::Dashboard -> $PAGES_URL/index.html"
          echo ""
          echo "Code Analysis Dashboard:"
          echo "   -> $PAGES_URL/index.html"
          echo ""
          echo "Individual Reports:"
          echo "   SpotBugs    -> $PAGES_URL/spotbugs.html"
          echo "   PMD         -> $PAGES_URL/pmd.html"
          echo "   Checkstyle  -> $PAGES_URL/checkstyle.html"
          echo ""
          echo "Security Analysis:"
          echo "   CodeQL      -> https://github.com/${{ github.repository }}/security/code-scanning"