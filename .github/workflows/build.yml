name: Build and Analysis
on:
  push:
    branches:
      - main
      - develop
      - feature/**
  pull_request:
    types: [ opened, synchronize, reopened ]
permissions:
    contents: write
    actions: read
    security-events: write
    pages: write
jobs:
  build-develop:
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feature/')
    runs-on: ubuntu-latest
    environment: develop
    name: Build and Analysis (develop)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu' # Alternative distribution options are available.

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and analyze
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.DB_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: mvn -B clean verify spotbugs:spotbugs pmd:pmd checkstyle:checkstyle site

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      - name: Create index Page for reports
        if: always()
        run: |
          mkdir -p target/site/reports
          cat > target/site/reports/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Code Analysis Reports - ${{ matrix.environment }}</title>
              <style>
                  body { font-family: Arial, sans-serif; margin: 40px; }
                  h1 { color: #333; }
                  .report-link { 
                      display: block; 
                      padding: 15px; 
                      margin: 10px 0; 
                      background: #f5f5f5; 
                      border-radius: 5px; 
                      text-decoration: none; 
                      color: #0366d6;
                  }
                  .report-link:hover { background: #e5e5e5; }
              </style>
          </head>
          <body>
              <h1>Code Analysis Reports - ${{ matrix.environment }} Branch</h1>
              <a class="report-link" href="../spotbugs.html">SpotBugs Report</a>
              <a class="report-link" href="../pmd.html">PMD Report</a>
              <a class="report-link" href="../checkstyle.html">Checkstyle Report</a>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages (Develop)
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site
          destination_dir: ${{ matrix.environment }}
          keep_files: false
          commit_message: "Deploy reports for ${{ matrix.environment }} - Run #${{ github.run_number }}"

      - name: Display Report URLs
        if: always()
        env:
          Branch: ${{ matrix.environment }}
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ matrix.environment }}
        run: |
            echo "::notice title=📊 Reports Deployed ($BRANCH)::Dashboard → $PAGES_URL/index.html"
          
            cat << 'EOF'
          
            ╔══════════════════════════════════════════════════════════════════╗
            ║                     DEPLOYMENT SUCCESSFUL                        ║
            ╚══════════════════════════════════════════════════════════════════╝
            EOF
          
            echo ""
            echo "Code Analysis Dashboard:"
            echo "   → $PAGES_URL/index.html"
            echo ""
            echo " Individual Reports:"
            echo "   SpotBugs    → $PAGES_URL/spotbugs.html"
            echo "   PMD         → $PAGES_URL/pmd.html"
            echo "   Checkstyle  → $PAGES_URL/checkstyle.html"
            echo ""
            echo "Security Analysis:"
            echo "   CodeQL      → https://github.com/$REPO/security/code-scanning"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  build-main:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: main

    name: Build and Analysis (main)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu' # Alternative distribution options are available.

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build and analyze
        env:
          SPRING_DATASOURCE_URL: ${{ secrets.DB_URL }}
          SPRING_DATASOURCE_USERNAME: ${{ secrets.DB_USERNAME }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: mvn -B clean verify spotbugs:spotbugs pmd:pmd checkstyle:checkstyle site

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      - name: Create index Page for reports
        if: always()
        run: |
          mkdir -p target/site/reports
          cat > target/site/reports/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Code Analysis Reports - ${{ matrix.environment }}</title>
              <style>
                  body { font-family: Arial, sans-serif; margin: 40px; }
                  h1 { color: #333; }
                  .report-link { 
                      display: block; 
                      padding: 15px; 
                      margin: 10px 0; 
                      background: #f5f5f5; 
                      border-radius: 5px; 
                      text-decoration: none; 
                      color: #0366d6;
                  }
                  .report-link:hover { background: #e5e5e5; }
              </style>
          </head>
          <body>
              <h1>Code Analysis Reports - ${{ matrix.environment }} Branch</h1>
              <a class="report-link" href="../spotbugs.html">SpotBugs Report</a>
              <a class="report-link" href="../pmd.html">PMD Report</a>
              <a class="report-link" href="../checkstyle.html">Checkstyle Report</a>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages (Develop)
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./target/site
          destination_dir: ${{ matrix.environment }}
          keep_files: false
          commit_message: "Deploy reports for ${{ matrix.environment }} - Run #${{ github.run_number }}"

      - name: Display Report URLs
        if: always()
        env:
          Branch: ${{ matrix.environment }}
          PAGES_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/${{ matrix.environment }}
        run: |
            echo "::notice title=📊 Reports Deployed ($BRANCH)::Dashboard → $PAGES_URL/index.html"

            cat << 'EOF'

            ╔══════════════════════════════════════════════════════════════════╗
            ║                     DEPLOYMENT SUCCESSFUL                        ║
            ╚══════════════════════════════════════════════════════════════════╝
            EOF

            echo ""
            echo "Code Analysis Dashboard:"
            echo "   → $PAGES_URL/index.html"
            echo ""
            echo " Individual Reports:"
            echo "   SpotBugs    → $PAGES_URL/spotbugs.html"
            echo "   PMD         → $PAGES_URL/pmd.html"
            echo "   Checkstyle  → $PAGES_URL/checkstyle.html"
            echo ""
            echo "Security Analysis:"
            echo "   CodeQL      → https://github.com/$REPO/security/code-scanning"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"