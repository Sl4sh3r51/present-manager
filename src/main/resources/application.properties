spring.application.name=present-manager
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
logging.level.org.springframework.security=TRACE

cors.allowed-origins=http://localhost:5173
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://wrlpaqcwftijjhdbcymy.supabase.co/auth/v1/.well-known/jwks.json

# Datasource kommt bei dir am einfachsten über Env-Variablen rein:
# - SPRING_DATASOURCE_URL
# - SPRING_DATASOURCE_USERNAME
# - SPRING_DATASOURCE_PASSWORD
#
# Beispiel (Supabase, direktes DB-Host, SSL required):
# SPRING_DATASOURCE_URL=jdbc:postgresql://db.<project-ref>.supabase.co:5432/postgres?sslmode=require
